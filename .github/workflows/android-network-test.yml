name: Android Network Test

on:
  workflow_dispatch:

jobs:
  test-network:
    runs-on: macos-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Start local HTTP server
        run: |
          python -m http.server 8080 --bind 127.0.0.1 &
          sleep 5

      - name: Test connectivity
        run: |
          curl -v http://127.0.0.1:8080

      - name: Report status
        run: |
          echo "Network test completed successfully at $(date)"
