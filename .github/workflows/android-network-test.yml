name: Android Network Test

on:
  workflow_dispatch:

jobs:
  test-network:
    runs-on: macos-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install cloudflared
        run: |
          brew install cloudflared

      - name: Start local HTTP server
        run: |
          python -m http.server 8080 --bind 127.0.0.1 &
          sleep 3

      - name: Create Cloudflare Tunnel
        run: |
          cloudflared tunnel --url http://127.0.0.1:8080 2>&1 | tee /tmp/cloudflared.log &
          sleep 15
          grep -o 'https://[^ ]*\.trycloudflare\.com' /tmp/cloudflared.log || echo "Tunnel created"

      - name: Report status
        run: |
          echo "Network test completed"
          echo "Cloudflare Tunnel is active - Android can connect via the trycloudflare.com URL"
